<!DOCTYPE html>
<html>

<head>
    <title>{app_title}</title>
    <link rel="manifest" href="manifest.json">
    <meta content="text/html;charset=utf-8" http-equiv="Content-Type" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8" />
    <script>
        (function () {
            var stored = null;
            try { stored = localStorage.getItem('shifty-theme'); } catch (e) { }
            var resolved;
            if (stored === 'dark' || stored === 'light') {
                resolved = stored;
            } else {
                resolved = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
            }
            document.documentElement.setAttribute('data-theme', resolved);
        })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <iframe id="silentRenewIframe" style="display:none;"></iframe>
    <script>
        window.oidcLoginKeepAliveURL = null;
        setInterval(() => {
            if (window.oidcLoginKeepAliveURL) {
                fetch(oidcLoginKeepAliveURL, {
                    method: "GET",
                });
            }
        }, 1000 * 60 * 5);
    </script>
    <div id="main"></div>
    <script type="module">
        import init from "/{base_path}/wasm/{app_name}.js";
        init("/{base_path}/wasm/{app_name}_bg.wasm").then(wasm => {
            if (wasm.__wbindgen_start == undefined) {
                wasm.main();
            }
        });
    </script>
</body>

</html>

                  <td className="mono" style={{ padding: '10px 14px', color: s.linkedUser ? 'var(--ink)' : 'var(--ink-muted)' }}>
                    {s.linkedUser || '—'}
                  </td>
                  <td style={{ padding: '10px 14px', textAlign: 'right' }}>
                    <Btn kind="ghost">Bearbeiten</Btn>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

// ─── App ─────────────────────────────────────────────────────
function App() {
  const [route, setRoute] = useState('shiftplan');
  const [slot, setSlot] = useState(null);
  const [selectedEmployee, setSelectedEmployee] = useState('p1');
  const currentUser = PEOPLE[0];

  // ─── Tweaks ────────────────────────────────────────────────
  const TWEAK_DEFAULS = /*EDITMODE-BEGIN*/{
    "modalVariant": "center",
    "workingHoursLayout": "cards",
    "billingDetailLayout": "cards"
  }/*EDITMODE-END*/;
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULS);
  const [tweaksOpen, setTweaksOpen] = useState(false);
  window.SHIFTY_TWEAKS = tweaks;

  const updateTweak = (key, value) => {
    setTweaks((t) => {
      const next = { ...t, [key]: value };
      window.SHIFTY_TWEAKS = next;
      try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: value } }, '*'); } catch {}
      return next;
    });
  };

  useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setTweaksOpen(true);
      if (t === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', onMsg);
    try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch {}
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const closeTweaks = () => {
    setTweaksOpen(false);
    try { window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); } catch {}
  };

  const [theme, setTheme] = useState(() => {
    try { return localStorage.getItem('shifty-theme') || 'system'; } catch { return 'system'; }
  });

  useEffect(() => {
    try { localStorage.setItem('shifty-theme', theme); } catch {}
    const apply = () => {
      const resolved = theme === 'system'
        ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
        : theme;
      document.documentElement.setAttribute('data-theme', resolved);
    };
    apply();
    if (theme === 'system') {
      const mq = window.matchMedia('(prefers-color-scheme: dark)');
      mq.addEventListener('change', apply);
      return () => mq.removeEventListener('change', apply);
    }
  }, [theme]);

  return (
    <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>
      <TopBar route={route} setRoute={setRoute} currentUser={currentUser} theme={theme} setTheme={setTheme} />
      <main style={{ flex: 1, maxWidth: 1400, width: '100%', margin: '0 auto', minWidth: 0 }}>
        {route === 'shiftplan' && <SchichtplanPage onSlotClick={setSlot} />}
        {route === 'my-shifts' && <MyShiftsPage />}
        {route === 'overview'  && <OverviewPage setRoute={setRoute} />}
        {route === 'employees' && <EmployeesPage onSelect={setSelectedEmployee} selected={selectedEmployee} modalVariant={tweaks.modalVariant} />}
        {route === 'billing'   && <BillingPage detailLayout={tweaks.billingDetailLayout} />}
        {route === 'users'     && <UsersPage />}
      </main>
      <SlotModal slot={slot} onClose={() => setSlot(null)} />

      {/* Tweaks Panel */}
      {tweaksOpen && (
        <div style={{
          position: 'fixed', right: 16, bottom: 16, zIndex: 300,
          width: 280, maxHeight: 'calc(100vh - 32px)',
          background: 'var(--surface)', color: 'var(--ink)',
          border: '1px solid var(--border)', borderRadius: 'var(--r-lg)',
          boxShadow: '0 12px 40px rgba(0,0,0,0.18), 0 2px 6px rgba(0,0,0,0.08)',
          display: 'flex', flexDirection: 'column', overflow: 'hidden',
        }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '10px 14px', borderBottom: '1px solid var(--border)' }}>
            <div style={{ fontSize: 14, fontWeight: 700 }}>Tweaks</div>
            <button onClick={closeTweaks} aria-label="Schließen" style={{
              width: 24, height: 24, borderRadius: 'var(--r-sm)',
              border: 'none', background: 'transparent', color: 'var(--ink-muted)',
              cursor: 'pointer', fontSize: 16, lineHeight: 1,
            }}>×</button>
          </div>
          <div style={{ padding: 14, overflowY: 'auto' }}>
            <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--ink-soft)', textTransform: 'uppercase', letterSpacing: '0.04em', marginBottom: 6 }}>
              Modal-Stil
            </div>
            <ModalVariantTweak value={tweaks.modalVariant} onChange={(v) => updateTweak('modalVariant', v)} />

            <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--ink-soft)', textTransform: 'uppercase', letterSpacing: '0.04em', marginTop: 16, marginBottom: 6 }}>
              Stunden-Übersicht (Schichtplan)
            </div>
            <div style={{ display: 'flex', background: 'var(--surface-alt)', padding: 2, borderRadius: 'var(--r-md)' }}>
              {[['cards', 'Karten'], ['table', 'Tabelle']].map(([k, lbl]) => (
                <button key={k} onClick={() => updateTweak('workingHoursLayout', k)} style={{
                  flex: 1, padding: '5px 10px', borderRadius: 'var(--r-sm)', border: 'none',
                  background: tweaks.workingHoursLayout === k ? 'var(--surface)' : 'transparent',
                  color: tweaks.workingHoursLayout === k ? 'var(--ink)' : 'var(--ink-muted)',
                  fontSize: 12, fontWeight: 600, cursor: 'pointer',
                  boxShadow: tweaks.workingHoursLayout === k ? '0 1px 2px rgba(15,18,30,0.06)' : 'none',
                }}>{lbl}</button>
              ))}
            </div>

            <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--ink-soft)', textTransform: 'uppercase', letterSpacing: '0.04em', marginTop: 16, marginBottom: 6 }}>
              Abrechnungs-Detail
            </div>
            <div style={{ display: 'flex', background: 'var(--surface-alt)', padding: 2, borderRadius: 'var(--r-md)' }}>
              {[['split', 'Master/Detail'], ['table', 'Tabelle'], ['cards', 'Karten']].map(([k, lbl]) => (
                <button key={k} onClick={() => updateTweak('billingDetailLayout', k)} style={{
                  flex: 1, padding: '5px 10px', borderRadius: 'var(--r-sm)', border: 'none',
                  background: tweaks.billingDetailLayout === k ? 'var(--surface)' : 'transparent',
                  color: tweaks.billingDetailLayout === k ? 'var(--ink)' : 'var(--ink-muted)',
                  fontSize: 12, fontWeight: 600, cursor: 'pointer',
                  boxShadow: tweaks.billingDetailLayout === k ? '0 1px 2px rgba(15,18,30,0.06)' : 'none',
                }}>{lbl}</button>
              ))}
            </div>

            <div style={{ fontSize: 12, color: 'var(--ink-muted)', marginTop: 10, lineHeight: 1.5 }}>
              Probier&apos;s aus: gehe zu <strong>Mitarbeiter</strong> und klicke „Arbeitvertrag hinzufügen“, oder öffne unter <strong>Abrechnung</strong> einen Zeitraum.
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>

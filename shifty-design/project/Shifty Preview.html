<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Shifty · Interaktiver Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #fbfbfc;
    --surface: #ffffff;
    --surface-alt: #f4f5f7;
    --surface-2: #eef0f4;
    --border: #e6e8ec;
    --border-strong: #d0d3da;
    --ink: #0e1117;
    --ink-soft: #3a4150;
    --ink-muted: #6b7382;
    --accent: #3a4cd1;
    --accent-ink: #ffffff;
    --accent-soft: #eaecfb;
    --good: #0e7a4d;
    --good-soft: #defaee;
    --warn: #a65a08;
    --warn-soft: #fef0d6;
    --bad: #b8281a;
    --bad-soft: #fde4e1;
    --pill-mix: rgba(255,255,255,0);   /* additive overlay on person-pills (none in light) */
    --chip-ink: #0e1117;               /* always-dark text for pastel chips, both themes */
    --modal-veil: rgba(14,17,23,0.4);
    --r-sm: 4px; --r-md: 6px; --r-lg: 10px;
  }
  [data-theme="dark"] {
    --bg: #0e1014;
    --surface: #16191f;
    --surface-alt: #1c2027;
    --surface-2: #232831;
    --border: #2a2f39;
    --border-strong: #3a4151;
    --ink: #eef0f4;
    --ink-soft: #b8bdc7;
    --ink-muted: #7a8290;
    --accent: #8b97ff;
    --accent-ink: #0e1014;
    --accent-soft: #232a4a;
    --good: #4ed59a;
    --good-soft: #16322a;
    --warn: #f0b766;
    --warn-soft: #3a2a14;
    --bad: #ef6a5b;
    --bad-soft: #3a1c18;
    --pill-mix: rgba(14,16,20,0.55);   /* tones down bright pastel chips on dark bg */
    --modal-veil: rgba(0,0,0,0.6);
  }
  /* Pastel chips/avatars need dark text in BOTH themes — pastels are designed for dark ink.
     !important because inline `color: var(--ink)` from older code paths would otherwise win. */
  .person-pill { color: var(--chip-ink) !important; }
  .person-avatar { color: var(--chip-ink) !important; }
  .person-pill.no-color { color: var(--ink-muted) !important; }
  .person-avatar.no-color { color: var(--ink-muted) !important; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--ink); }
  body { font-family: 'Inter', system-ui, -apple-system, sans-serif; -webkit-font-smoothing: antialiased; font-size: 16px; line-height: 1.5; }
  * { box-sizing: border-box; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace; font-variant-numeric: tabular-nums; }
  button { font-family: inherit; color: inherit; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }

  /* Schmalere Scrollbar in den Stunden-Zellen — sonst frisst sie zu viel Chip-Platz. */
  .cell-chips::-webkit-scrollbar { width: 4px; }
  .cell-chips::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }
  .cell-chips { scrollbar-width: thin; scrollbar-color: var(--border-strong) transparent; }

  /* Responsive */
  .topbar { padding: 0 18px !important; }
  .topbar-nav { display: flex; gap: 2px; flex: 1; min-width: 0; overflow-x: auto; scrollbar-width: none; }
  .topbar-nav::-webkit-scrollbar { display: none; }
  .topbar-burger { display: none; }
  .topbar-user-label { display: inline; }
  .topbar-user-name { display: inline; }
  .employees-grid { display: grid; grid-template-columns: minmax(280px, 360px) 1fr; gap: 18px; align-items: start; padding: 18px; }
  .employee-detail-cols { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 18px; }
  .employee-detail-col-2, .employee-detail-col-3 { border-left: 1px solid var(--border); padding-left: 18px; }
  .toolbar-row { flex-wrap: wrap; }
  @media (max-width: 720px) {
    body { font-size: 15px; }
    .topbar { padding: 0 10px !important; height: 52px !important; }
    .topbar-brand-wide { font-size: 16px !important; }
    .topbar-user-label { display: none; }
    .topbar-user-name { display: none; }
    .topbar-burger {
      display: inline-flex !important; align-items: center; justify-content: center;
      width: 34px; height: 34px; border-radius: var(--r-md);
      background: transparent; border: 1px solid var(--border);
      color: var(--ink-soft); cursor: pointer; flex-shrink: 0;
      font-size: 16px;
    }
    .topbar-nav {
      position: fixed; top: 52px; left: 0; right: 0;
      flex-direction: column; gap: 0;
      background: var(--surface); border-bottom: 1px solid var(--border);
      box-shadow: 0 8px 16px rgba(0,0,0,0.08);
      padding: 8px;
      z-index: 9;
      max-height: calc(100vh - 52px); overflow-y: auto;
      display: none;
    }
    .topbar.menu-open .topbar-nav { display: flex; }
    .topbar-mobile-spacer { display: block !important; }
    .topbar-nav button {
      width: 100%; text-align: left !important;
      padding: 12px 14px !important; font-size: 14px !important;
      border-radius: var(--r-md) !important;
    }
    /* On mobile: hide the desktop dropdown trigger entirely; show the flat inline list instead. */
    .topbar-admin-wrap { display: none !important; }
    .topbar-admin-mobile { display: block !important; }
    .page-pad { padding: 12px !important; }
    .employees-grid { grid-template-columns: 1fr !important; padding: 12px !important; gap: 10px !important; }
    .employees-grid.detail-active .employees-list { display: none; }
    .employees-grid:not(.detail-active) .employees-detail { display: none; }
    .employees-back { display: inline-flex !important; }
    .employee-detail-col-2, .employee-detail-col-3 { border-left: none; padding-left: 0; border-top: 1px solid var(--border); padding-top: 14px; }
    .toolbar-row { gap: 6px !important; padding: 10px !important; }
    .toolbar-row > .toolbar-divider { display: none; }
    .toolbar-row .toolbar-spacer { display: none; }
    .week-grid-wrap { margin: 0 -12px; border-radius: 0 !important; border-left: none !important; border-right: none !important; }
    .my-shifts-day { grid-template-columns: 80px 1fr 50px !important; padding: 8px 12px !important; gap: 8px !important; }
    .overview-table-wrap { overflow-x: auto; }
    .overview-table-wrap table { min-width: 540px; }
    .users-table-wrap { overflow-x: auto; }
    .users-table-wrap table { min-width: 600px; }
    .stat-row { grid-template-columns: 1fr 1fr !important; }
  }

  /* Modal animations */
  @keyframes shifty-modal-fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes shifty-modal-pop {
    from { opacity: 0; transform: translateY(8px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes shifty-modal-slide-up {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  @keyframes shifty-modal-slide-right {
    from { transform: translateX(100%); }
    to   { transform: translateX(0); }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="preview-data.jsx"></script>
<script type="text/babel" src="modal.jsx"></script>
<script type="text/babel">
const { useState, useMemo, useEffect } = React;
const { PEOPLE, PERSON_BY_ID, WEEK_DEFAULT, YEAR_SUMMARY, MY_SHIFTS } = window.SHIFTY_DATA;

// ─── shared bits ─────────────────────────────────────────────
// Top-level nav. Admin-only items are grouped under "Verwaltung" so the bar
// stays narrow enough to never need horizontal scroll on a laptop.
const ROUTES = [
  { id: 'shiftplan', label: 'Schichtplan' },
  { id: 'my-shifts', label: 'Meine Schichten' },
  { id: 'overview',  label: 'Jahresübersicht' },
];
const ADMIN_GROUP = {
  label: 'Verwaltung',
  items: [
    { id: 'employees', label: 'Mitarbeiter' },
    { id: 'billing',   label: 'Abrechnungszeiträume' },
    { id: 'users',     label: 'Benutzerverwaltung' },
  ],
};

function TopBar({ route, setRoute, currentUser, theme, setTheme }) {
  const themeIcon = theme === 'dark' ? '☾' : theme === 'light' ? '☀' : '⌬';
  const themeTitle = theme === 'dark' ? 'Dunkel' : theme === 'light' ? 'Hell' : 'System';
  const [menuOpen, setMenuOpen] = useState(false);
  const [adminOpen, setAdminOpen] = useState(false);
  const handleNav = (id) => { setRoute(id); setMenuOpen(false); setAdminOpen(false); };
  const adminActive = ADMIN_GROUP.items.some((i) => i.id === route);
  const activeAdminItem = ADMIN_GROUP.items.find((i) => i.id === route);

  const adminMenuRef = React.useRef(null);
  const adminTriggerRef = React.useRef(null);

  // Outside-click via document mousedown. The toggle button itself is excluded
  // by checking the trigger ref — and we install on the next animation frame so
  // the click that opens the menu can't immediately close it.
  useEffect(() => {
    if (!adminOpen) return;
    let armed = false;
    const armId = requestAnimationFrame(() => { armed = true; });
    const onDoc = (e) => {
      if (!armed) return;
      const root = adminMenuRef.current;
      const trigger = adminTriggerRef.current;
      if (root && root.contains(e.target)) return;
      if (trigger && trigger.contains(e.target)) return;
      setAdminOpen(false);
    };
    const onKey = (e) => { if (e.key === 'Escape') setAdminOpen(false); };
    document.addEventListener('mousedown', onDoc);
    document.addEventListener('keydown', onKey);
    return () => {
      cancelAnimationFrame(armId);
      document.removeEventListener('mousedown', onDoc);
      document.removeEventListener('keydown', onKey);
    };
  }, [adminOpen]);

  const navBtnStyle = (active) => ({
    background: active ? 'var(--accent-soft)' : 'transparent',
    border: 'none',
    color: active ? 'var(--accent)' : 'var(--ink-soft)',
    fontSize: 14, fontWeight: active ? 600 : 500,
    padding: '7px 10px', borderRadius: 'var(--r-sm)',
    cursor: 'pointer', whiteSpace: 'nowrap',
    display: 'inline-flex', alignItems: 'center', gap: 4,
  });

  return (
    <header className={`topbar${menuOpen ? ' menu-open' : ''}`} style={{
      display: 'flex', alignItems: 'center', gap: 4,
      padding: '0 18px', height: 56,
      background: 'var(--surface)',
      borderBottom: '1px solid var(--border)',
      position: 'sticky', top: 0, zIndex: 10,
    }}>
      <button
        className="topbar-burger"
        onClick={() => setMenuOpen(!menuOpen)}
        aria-label={menuOpen ? 'Menü schließen' : 'Menü öffnen'}
        aria-expanded={menuOpen}
      >{menuOpen ? '✕' : '☰'}</button>
      <span className="topbar-brand-wide" style={{ fontSize: 18, fontWeight: 700, letterSpacing: '-0.01em', marginRight: 12, marginLeft: 4 }}>
        Shifty<span style={{ color: 'var(--accent)' }}>.</span>
      </span>
      <nav className="topbar-nav">
        {ROUTES.map((r) => (
          <button key={r.id} onClick={() => handleNav(r.id)} style={navBtnStyle(route === r.id)}>
            {r.label}
          </button>
        ))}
        <span ref={adminMenuRef} data-admin-menu className="topbar-admin-wrap" style={{ position: 'relative', display: 'inline-block' }}>
          <button
            ref={adminTriggerRef}
            className="topbar-admin-trigger"
            onClick={() => setAdminOpen((v) => !v)}
            aria-haspopup="menu"
            aria-expanded={adminOpen}
            style={navBtnStyle(adminActive)}
          >
            {activeAdminItem ? activeAdminItem.label : ADMIN_GROUP.label}
            <span aria-hidden="true" style={{ fontSize: 11, opacity: 0.7, marginLeft: 1 }}>▾</span>
          </button>
          {adminOpen && (() => {
            const tr = adminTriggerRef.current && adminTriggerRef.current.getBoundingClientRect();
            const top = tr ? tr.bottom + 4 : 0;
            const left = tr ? tr.left : 0;
            return (
              <div role="menu" className="topbar-admin-menu" style={{
                position: 'fixed', top, left,
                minWidth: 220, padding: 4,
                background: 'var(--surface)', border: '1px solid var(--border)',
                borderRadius: 'var(--r-md)',
                boxShadow: '0 8px 24px rgba(15,18,30,0.12), 0 2px 6px rgba(15,18,30,0.06)',
                zIndex: 50,
              }}>
              {ADMIN_GROUP.items.map((it) => {
                const active = route === it.id;
                return (
                  <button key={it.id} role="menuitem" onClick={() => handleNav(it.id)} style={{
                    display: 'block', width: '100%', textAlign: 'left',
                    padding: '8px 10px', borderRadius: 'var(--r-sm)',
                    border: 'none', cursor: 'pointer',
                    background: active ? 'var(--accent-soft)' : 'transparent',
                    color: active ? 'var(--accent)' : 'var(--ink)',
                    fontSize: 14, fontWeight: active ? 600 : 500,
                  }}
                    onMouseEnter={(e) => { if (!active) e.currentTarget.style.background = 'var(--surface-alt)'; }}
                    onMouseLeave={(e) => { if (!active) e.currentTarget.style.background = 'transparent'; }}
                  >{it.label}</button>
                );
              })}
            </div>
            );
          })()}
        </span>
        {/* Mobile flattens the dropdown into an inline labelled section. Hidden on desktop via CSS. */}
        <div className="topbar-admin-mobile" style={{ display: 'none' }}>
          <div style={{
            fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.06em',
            color: 'var(--ink-muted)', padding: '12px 14px 4px',
            borderTop: '1px solid var(--border)', marginTop: 4,
          }}>{ADMIN_GROUP.label}</div>
          {ADMIN_GROUP.items.map((it) => (
            <button key={it.id} onClick={() => handleNav(it.id)} style={navBtnStyle(route === it.id)}>
              {it.label}
            </button>
          ))}
        </div>
      </nav>
      <span className="topbar-mobile-spacer" style={{ display: 'none', flex: 1 }} />
      <button
        onClick={() => setTheme(theme === 'light' ? 'dark' : theme === 'dark' ? 'system' : 'light')}
        title={`Theme: ${themeTitle} (klicken zum Wechseln)`}
        aria-label={`Theme wechseln, aktuell ${themeTitle}`}
        style={{
          width: 30, height: 30, borderRadius: 'var(--r-md)',
          background: 'transparent', border: '1px solid var(--border)',
          color: 'var(--ink-soft)', cursor: 'pointer',
          display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
          fontSize: 15, marginLeft: 6, flexShrink: 0,
        }}
      >{themeIcon}</button>
      <span className="topbar-user-label" style={{ fontSize: 12, color: 'var(--ink-muted)', marginLeft: 8 }}>Du bist</span>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '4px 12px', borderRadius: 999, background: 'var(--surface-alt)' }}>
        <span className="topbar-user-name" style={{ fontSize: 14, fontWeight: 500 }}>{currentUser.name}</span>
      </div>
    </header>
  );
}

function PersonChip({ person, conflict, onRemove, dim }) {
  if (!person) return null;
  const hasColor = !!person.color;
  return (
    <span className={`person-pill${hasColor ? '' : ' no-color'}`} style={{
      display: 'inline-flex', alignItems: 'center', gap: 3,
      padding: '1px 4px 1px 7px', borderRadius: 'var(--r-sm)',
      background: hasColor ? person.color : 'transparent',
      color: 'var(--ink)', fontSize: 12, fontWeight: 500, lineHeight: '18px',
      border: hasColor ? '1.5px solid transparent' : '1px dashed var(--border-strong)',
      opacity: dim ? 0.45 : 1,
      whiteSpace: 'nowrap',
    }}>
      <span>{person.name}</span>
      {onRemove && (
        <button onClick={(e) => { e.stopPropagation(); onRemove(); }} title="Entfernen" style={{
          background: 'transparent', border: 'none', cursor: 'pointer',
          padding: '0 2px', fontSize: 12, lineHeight: '14px',
          color: 'var(--ink-muted)', borderRadius: 2,
        }}>×</button>
      )}
    </span>
  );
}

function Btn({ kind = 'secondary', children, onClick, icon, disabled }) {
  const styles = {
    primary:   { background: 'var(--accent)', color: 'var(--accent-ink)', border: '1px solid var(--accent)' },
    secondary: { background: 'var(--surface)', color: 'var(--ink)', border: '1px solid var(--border-strong)' },
    ghost:     { background: 'transparent', color: 'var(--ink-soft)', border: '1px solid transparent' },
    danger:    { background: 'var(--surface)', color: 'var(--bad)', border: '1px solid var(--bad)' },
  };
  return (
    <button disabled={disabled} onClick={onClick} style={{
      ...styles[kind],
      padding: '6px 12px', borderRadius: 'var(--r-md)',
      fontSize: 14, fontWeight: 500, cursor: disabled ? 'not-allowed' : 'pointer',
      display: 'inline-flex', alignItems: 'center', gap: 5, whiteSpace: 'nowrap',
      opacity: disabled ? 0.5 : 1,
    }}>
      {icon && <span className="mono" style={{ fontSize: 14 }}>{icon}</span>}
      {children}
    </button>
  );
}

// ─── Schichtplan ─────────────────────────────────────────────
function SchichtplanPage({ onSlotClick }) {
  const w = WEEK_DEFAULT;
  const [tab, setTab] = useState(0);
  const [view, setView] = useState('week');
  const [editingFor, setEditingFor] = useState('p1');
  const [showLog, setShowLog] = useState(false);

  // Day totals
  const dayTotals = w.days.map((_, di) => {
    let h = 0;
    w.grid.forEach((row) => { h += row[di].assigned.length; });
    return h;
  });

  // Day-level conflicts: a column is "in conflict" only when every staffed cell in that day
  // has a conflict (i.e. the whole column is broken). Per-cell red was too noisy.
  const dayConflicts = w.days.map((_, di) => {
    let staffed = 0, conflicted = 0;
    w.grid.forEach((row) => {
      const c = row[di];
      if (c.assigned.length > 0) {
        staffed++;
        if (c.assigned.some((a) => a.conflict)) conflicted++;
      }
    });
    return staffed > 0 && conflicted === staffed;
  });

  return (
    <div style={{ padding: 18, display: 'flex', flexDirection: 'column', gap: 14 }}>
      {/* week toolbar */}
      <div className="toolbar-row" style={{
        display: 'flex', alignItems: 'center', gap: 8,
        background: 'var(--surface)', border: '1px solid var(--border)',
        borderRadius: 'var(--r-lg)', padding: '10px 14px',
      }}>
        <button style={navBtn} title="Vorwoche">‹</button>
        <span className="mono" style={{ fontSize: 14, fontWeight: 600 }}>{w.label}</span>
        <button style={navBtn} title="Nächste Woche">›</button>
        <span className="toolbar-divider" style={{ width: 1, height: 22, background: 'var(--border)', margin: '0 6px' }} />
        <div style={{ display: 'flex', background: 'var(--surface-alt)', padding: 2, borderRadius: 'var(--r-md)' }}>
          {[['week','Woche'], ['day','Tag']].map(([k, lbl]) => (
            <button key={k} onClick={() => setView(k)} style={{
              padding: '4px 12px', borderRadius: 'var(--r-sm)', border: 'none',
              background: view === k ? 'var(--surface)' : 'transparent',
              color: view === k ? 'var(--ink)' : 'var(--ink-muted)',
              fontSize: 12, fontWeight: 600, cursor: 'pointer',
              boxShadow: view === k ? '0 1px 2px rgba(15,18,30,0.06)' : 'none',
            }}>{lbl}</button>
          ))}
        </div>
        <span className="toolbar-spacer" style={{ flex: 1 }} />
        <Btn icon="+" onClick={() => alert('Letzte Woche kopieren')}>Letzte Woche</Btn>
        <Btn icon="↓" onClick={() => alert('iCal Export')}>iCal</Btn>
        <Btn onClick={() => setShowLog(!showLog)}>{showLog ? 'Log ausblenden' : 'Buchungsprotokoll'}</Btn>
        <span style={{ fontSize: 12, color: 'var(--ink-muted)', marginLeft: 8 }}>Du bearbeitest:</span>
        <select value={editingFor} onChange={(e) => setEditingFor(e.target.value)} style={{
          padding: '5px 10px', borderRadius: 'var(--r-md)', border: '1px solid var(--border-strong)',
          background: 'var(--surface)', fontSize: 14, color: 'var(--ink)',
        }}>
          {PEOPLE.map((p) => <option key={p.id} value={p.id}>{p.name}</option>)}
        </select>
      </div>

      {/* tabs */}
      <div style={{ display: 'flex', gap: 0, borderBottom: '1px solid var(--border)' }}>
        {w.tabs.map((tname, i) => (
          <button key={tname} onClick={() => setTab(i)} style={{
            background: 'transparent', border: 'none', padding: '8px 16px',
            cursor: 'pointer', fontSize: 14, fontWeight: i === tab ? 600 : 500,
            color: i === tab ? 'var(--accent)' : 'var(--ink-muted)',
            borderBottom: `2px solid ${i === tab ? 'var(--accent)' : 'transparent'}`,
            marginBottom: -1,
          }}>{tname}</button>
        ))}
      </div>

      {/* week grid — horizontally scrollable on narrow viewports */}
      <div className="week-grid-wrap" style={{
        background: 'var(--surface)', border: '1px solid var(--border)',
        borderRadius: 'var(--r-lg)', overflow: 'auto',
      }}>
        <div style={{
          display: 'grid', gridTemplateColumns: '76px repeat(6, minmax(140px, 1fr))', minWidth: 920,
        }}>
          <div style={{ ...headerCell, borderRight: '1px solid var(--border)', position: 'sticky', left: 0, zIndex: 3 }} />
          {w.days.map((d, i) => (
            <div key={i} style={{ ...headerCell, borderRight: i < 5 ? '1px solid var(--border)' : 'none' }}>
              <div style={{ fontSize: 12, fontWeight: 700 }}>{d.long}, {d.date}</div>
              <div className="mono" style={{ fontSize: 11, color: 'var(--ink-muted)', marginTop: 2 }}>
                {dayTotals[i].toFixed(1)}h
              </div>
            </div>
          ))}

          {w.hours.map((h, hi) => (
            <React.Fragment key={h}>
              <div className="mono" style={{
                padding: '8px 8px', fontSize: 12, color: 'var(--ink-muted)',
                borderTop: '1px solid var(--border)', borderRight: '1px solid var(--border)',
                background: 'var(--surface)', textAlign: 'right',
                position: 'sticky', left: 0, zIndex: 2,
              }}>
                {h}–{w.hours[hi + 1] || (parseInt(h) + 1) + ':00'}
              </div>
              {w.days.map((_, di) => {
                const cell = w.grid[hi][di];
                const filled = cell.assigned.length;
                const missing = filled < cell.need;
                const colConflict = dayConflicts[di];
                const stateBg = colConflict ? 'var(--bad-soft)' : missing ? 'var(--warn-soft)' : 'var(--surface)';
                const editingPerson = PERSON_BY_ID[editingFor];
                const editingAssigned = cell.assigned.some((a) => a.id === editingFor);
                return (
                  <div key={di}
                    style={{
                      borderTop: '1px solid var(--border)',
                      borderRight: di < 5 ? '1px solid var(--border)' : 'none',
                      background: stateBg,
                      height: 56,
                      transition: 'background 0.1s',
                      position: 'relative',
                      overflow: 'hidden',
                    }}
                    onMouseEnter={(e) => e.currentTarget.style.background = colConflict ? '#fdd1cb' : missing ? '#fde9c4' : 'var(--surface-alt)'}
                    onMouseLeave={(e) => e.currentTarget.style.background = stateBg}
                  >
                    {/* n/m pill — pinned top-left, always visible */}
                    <span className="mono" style={{
                      position: 'absolute', top: 6, left: 8,
                      fontSize: 11, fontWeight: 700,
                      color: missing ? 'var(--warn)' : 'var(--ink-muted)',
                      lineHeight: '18px',
                      pointerEvents: 'none',
                      zIndex: 1,
                    }}>{filled}/{cell.need}</span>
                    {/* scrollable chip area — leaves room for the n/m pill (left) and +/− button (right) */}
                    <div className="cell-chips" style={{
                      position: 'absolute', inset: '6px 32px 6px 38px',
                      display: 'flex', flexWrap: 'wrap', gap: 4,
                      overflowY: 'auto', overflowX: 'hidden',
                      alignContent: 'flex-start',
                    }}>
                      {cell.assigned.map((a, i) => (
                        <PersonChip key={i} person={PERSON_BY_ID[a.id]} conflict={a.conflict} />
                      ))}
                    </div>
                    <button
                      onClick={(e) => {
                        e.stopPropagation();
                        if (editingAssigned) {
                          alert('Entfernen: ' + editingPerson.name + ' aus ' + w.days[di].long + ' ' + h);
                        } else {
                          alert('Hinzufügen: ' + editingPerson.name + ' zu ' + w.days[di].long + ' ' + h);
                        }
                      }}
                      title={editingAssigned ? `${editingPerson.name} entfernen` : `${editingPerson.name} hinzufügen`}
                      style={{
                        position: 'absolute',
                        top: 6, right: 6,
                        width: 20, height: 20, padding: 0, lineHeight: '18px',
                        border: '1px solid ' + (editingAssigned ? 'var(--bad)' : 'var(--border-strong)'),
                        background: editingAssigned ? 'var(--bad-soft)' : 'var(--surface)',
                        color: editingAssigned ? 'var(--bad)' : 'var(--ink-soft)',
                        borderRadius: 3, cursor: 'pointer', fontSize: 14, fontWeight: 700,
                        display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                        zIndex: 2,
                      }}>{editingAssigned ? '−' : '+'}</button>
                  </div>
                );
              })}
            </React.Fragment>
          ))}
        </div>
      </div>

      {/* working hours mini overview — switchable cards / table */}
      <WorkingHoursOverview defaultLayout={window.SHIFTY_TWEAKS?.workingHoursLayout || 'cards'} />

      {showLog && <BookingLogTable />}
    </div>
  );
}

            </thead>
            <tbody>

                const pct = Math.min(100, (p.hours / p.target) * 100);
                const diff = p.hours - p.target;
                const under = diff < 0;
                return (
                  <tr key={p.id} style={{ borderTop: '1px solid var(--border)' }}>
                    <td style={{ padding: '8px 14px' }}>

                <td className="mono" style={{ padding: '8px 14px', textAlign: 'right', fontWeight: 600 }}>{totalActual.toFixed(1)}h</td>
                <td className="mono" style={{ padding: '8px 14px', textAlign: 'right', fontWeight: 600, color: 'var(--ink-muted)' }}>{totalTarget.toFixed(1)}h</td>

                <td />
              </tr>
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

      <div className="overview-table-wrap" style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 'var(--r-lg)', overflow: 'hidden' }}>
        <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 14 }}>
          <thead>
            <tr style={{ background: 'var(--surface-alt)', textAlign: 'left' }}>
              {['Woche', 'Bezahlt / Freiwillig', 'Verfügbar / Benötigt', 'Differenz'].map((h) => (
                <th key={h} style={{ padding: '10px 14px', fontSize: 12, fontWeight: 600, color: 'var(--ink-muted)', textTransform: 'uppercase', letterSpacing: '0.04em' }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {YEAR_SUMMARY.slice(15, 25).map((w) => (
              <tr key={w.week} style={{ borderTop: '1px solid var(--border)', background: w.week === 17 ? 'var(--accent-soft)' : 'transparent' }}>
                <td style={{ padding: '10px 14px' }}>
                  <div style={{ fontWeight: 600 }}>2026 / KW {w.week}</div>
                  <div className="mono" style={{ fontSize: 12, color: 'var(--ink-muted)' }}>20.04 – 26.04</div>
                </td>
                <td className="mono" style={{ padding: '10px 14px' }}>
                  💰 {w.paid.toFixed(1)} · 🤝 {w.volunteer.toFixed(1)}
                </td>
                <td className="mono" style={{ padding: '10px 14px' }}>{w.paid + w.volunteer} / {w.required}</td>
                <td className="mono" style={{ padding: '10px 14px', color: w.missing > 0 ? 'var(--warn)' : 'var(--good)', fontWeight: 600 }}>

              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function TupleRow({ label, value, dim }) {

}

function EmployeeDetail({ person, onBack, modalVariant: modalVariantProp }) {
  const [year, setYear] = useState(2026);
  const [contractOpen, setContractOpen] = useState(false);
  const [contractInitial, setContractInitial] = useState(null);
  const [extraOpen, setExtraOpen] = useState(false);
  const modalVariant = modalVariantProp || window.SHIFTY_TWEAKS?.modalVariant || 'auto';
  if (!person) return <div style={{ color: 'var(--ink-muted)', padding: 40, textAlign: 'center' }}>Wähle einen Mitarbeiter</div>;
  const [fullYear, setFullYear] = useState(false);
  const [expandWeeks, setExpandWeeks] = useState(false);
  const [selectedWeek, setSelectedWeek] = useState(null);

  // Synthesised per-week data for this person — full 52-week year.
  // CURRENT_KW = 17 (the "now" week). Future weeks have no data unless fullYear is on.
  const CURRENT_KW = 17;
  const weeks = useMemo(() => Array.from({ length: 52 }).map((_, i) => {
    const kw = i + 1;
    const isPast = kw <= CURRENT_KW;
    const isCurrent = kw === CURRENT_KW;
    // Synthetic hours pattern (kept smooth across 52 weeks)
    const hours = (Math.sin(i * 0.42) + 1) * 10 + 18 + (isCurrent ? -6 : 0);
    const days = Math.max(1, Math.min(5, Math.round(hours / 6 + (i % 3 === 0 ? -1 : 0))));
    return {
      kw,
      isPast,
      isCurrent,
      hasData: isPast || fullYear,
      hours,
      days,
      target: person.target,
      shifts: Array.from({ length: days }).map((__, di) => {
        const dayName = ['Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa'][di] || 'Mo';
        const startH = 8 + (di * 3 + i) % 6;
        const endH = startH + Math.max(2, Math.round(hours / days));
        return { day: dayName, from: `${String(startH).padStart(2, '0')}:00`, to: `${String(Math.min(endH, 22)).padStart(2, '0')}:00` };
      }),
    };
  }), [person.target, fullYear]);

  const weekDetail = selectedWeek != null ? weeks[selectedWeek] : null;

  // Derived demo numbers
  const expected = person.target * 17;
  const shiftplan = person.hours * 4.2;
  const extra = 6.0;
  const vacation = 24.0;
  const sick = 8.0;
  const holidays = 8.0;
  const unpaid = 0.0;
  const overall = shiftplan + extra + vacation + sick + holidays;
  const balance = overall - expected;
  const carryover = -3.5;
  const swColor = person.color || 'var(--surface-2)';

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 18 }}>
      {/* header — name, year nav, actions */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 10 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
          {onBack && (
            <button onClick={onBack} className="employees-back" style={{
              display: 'none', background: 'transparent', border: '1px solid var(--border)',
              borderRadius: 'var(--r-md)', width: 30, height: 30, cursor: 'pointer',
              color: 'var(--ink-soft)', fontSize: 14, alignItems: 'center', justifyContent: 'center',
            }} aria-label="Zurück zur Liste">‹</button>
          )}
          <span className={`person-avatar${person.color ? '' : ' no-color'}`} style={{ width: 44, height: 44, borderRadius: '50%', background: swColor, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', fontSize: 14, fontWeight: 700, border: person.color ? 'none' : '1px dashed var(--border-strong)' }}>{person.initials}</span>
          <div>
            <h1 style={{ fontSize: 22, fontWeight: 600, margin: 0, letterSpacing: '-0.01em' }}>{person.name}</h1>
            <div style={{ fontSize: 12, color: 'var(--ink-muted)' }}>{person.paid ? 'Bezahlt' : 'Freiwillig'} · {person.target}h/Woche{!person.color && ' · keine Farbe gesetzt'}</div>
          </div>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <button style={navBtn} onClick={() => setYear(year - 1)}>‹</button>
          <span className="mono" style={{ fontSize: 14, fontWeight: 600, padding: '0 6px' }}>{year}</span>
          <button style={navBtn} onClick={() => setYear(year + 1)}>›</button>
          <span style={{ width: 1, height: 22, background: 'var(--border)', margin: '0 4px' }} />
          <Btn icon="+" onClick={() => setExtraOpen(true)}>Sonstige Stunden</Btn>
          <Btn>Mehr ▾</Btn>
        </div>
      </div>

      {!fullYear && (
        <div style={{ fontSize: 12, color: 'var(--ink-muted)', fontStyle: 'italic' }}>
          Nur Daten bis zur aktuellen Woche werden angezeigt.
          <button onClick={() => setFullYear(true)} style={{ marginLeft: 8, background: 'none', border: 'none', color: 'var(--accent)', cursor: 'pointer', textDecoration: 'underline', fontSize: 12 }}>
            Vollständiges Jahr anzeigen
          </button>
        </div>
      )}

      {/* 3-column main: Overall | Work Details + Hours/Week | Extra Hours */}
      <div className="employee-detail-cols">
        {/* Gesamtansicht */}
        <section>
          <h2 style={{ fontSize: 15, fontWeight: 700, margin: '0 0 8px' }}>Gesamtansicht</h2>
          <ul style={{ listStyle: 'none', padding: 0, margin: 0 }}>
            <TupleRow label="Stundenkonto" value={`${balance >= 0 ? '+' : ''}${balance.toFixed(2)} Std.`} />
            <TupleRow label="Gesamt" value={`${overall.toFixed(2)} Std.`} />
            <TupleRow label="Soll" value={`${expected.toFixed(2)} Std.`} />
            <li style={{ height: 8 }} />
            <TupleRow label="Schichtplan" value={`${shiftplan.toFixed(2)} Std.`} dim />
            <TupleRow label="Zusatzarbeit" value={`${extra.toFixed(2)} Std.`} dim />
            <TupleRow label="Urlaub" value={`${vacation.toFixed(2)} Std.`} dim />
            <TupleRow label="Krank" value={`${sick.toFixed(2)} Std.`} dim />
            <TupleRow label="Feiertage" value={`${holidays.toFixed(2)} Std.`} dim />
            <TupleRow label="Unbezahlter Urlaub" value={`${unpaid.toFixed(2)} Std.`} dim />
            <TupleRow label="Übertrag Vorjahr" value={`${carryover.toFixed(2)} Std.`} dim />
          </ul>

          <h2 style={{ fontSize: 15, fontWeight: 700, margin: '20px 0 8px' }}>Urlaub</h2>
          <ul style={{ listStyle: 'none', padding: 0, margin: 0 }}>
            <TupleRow label="Urlaubstage" value="14 / 28" />
            <TupleRow label="Vorjahresurlaub" value="3" />
          </ul>
        </section>

        {/* Arbeitsverträge + Stunden pro Woche */}
        <section className="employee-detail-col-2">
          <h2 style={{ fontSize: 15, fontWeight: 700, margin: '0 0 8px' }}>Arbeitsverträge</h2>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 6, marginBottom: 8 }}>
            {[
              { from: '01.01.2026', to: '31.12.2026', hours: 38.0, days: 5, vacation: 28, weekdays: ['Mo', 'Di', 'Mi', 'Do', 'Fr'] },
              { from: '01.01.2024', to: '31.12.2025', hours: 32.0, days: 4, vacation: 24, weekdays: ['Mo', 'Di', 'Do', 'Fr'] },
            ].map((wd, i) => (
              <button key={i} onClick={() => { setContractInitial(wd); setContractOpen(true); }} style={{ textAlign: 'left', display: 'flex', justifyContent: 'space-between', padding: '8px 10px', border: '1px solid var(--border)', background: 'var(--surface)', borderRadius: 'var(--r-md)', cursor: 'pointer' }}>
                <div>
                  <div className="mono" style={{ fontSize: 12, fontWeight: 500 }}>{wd.from} – {wd.to}</div>
                  <div style={{ fontSize: 12, color: 'var(--ink-muted)' }}>{wd.weekdays.join(' · ')} · {wd.vacation} Urlaubstage</div>
                </div>
                <div className="mono" style={{ fontSize: 14, fontWeight: 600 }}>{wd.hours.toFixed(1)}h</div>
              </button>
            ))}
          </div>
          <Btn icon="+" onClick={() => { setContractInitial(null); setContractOpen(true); }}>Arbeitvertrag hinzufügen</Btn>

          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 22 }}>
            <h2 style={{ fontSize: 15, fontWeight: 700, margin: 0 }}>Stunden pro Woche</h2>
            <button onClick={() => setExpandWeeks(!expandWeeks)} style={{ background: 'none', border: 'none', color: 'var(--accent)', cursor: 'pointer', textDecoration: 'underline', fontSize: 12 }}>
              {expandWeeks ? 'Weniger' : 'Mehr'}
            </button>
          </div>
          <div style={{ display: 'flex', alignItems: 'flex-end', gap: 1, height: 100, marginTop: 10, position: 'relative' }}>
            {weeks.map((wk, i) => {
              const under = wk.hours < person.target;
              const isSelected = selectedWeek === i;
              if (!wk.hasData) {
                return (
                  <div
                    key={i}
                    title={`KW ${wk.kw}: noch keine Daten`}
                    style={{
                      flex: 1, position: 'relative', height: '100%',
                      borderRight: wk.kw === CURRENT_KW ? '1px solid var(--ink-muted)' : 'none',
                      opacity: 0.5,
                    }}
                  />
                );
              }
              return (
                <button
                  key={i}
                  onClick={() => setSelectedWeek(isSelected ? null : i)}
                  title={`KW ${wk.kw}: ${wk.hours.toFixed(1)}h · klicken für Details`}
                  style={{
                    flex: 1, position: 'relative', height: '100%',
                    display: 'flex', alignItems: 'flex-end',
                    background: 'transparent', border: 'none', padding: 0, cursor: 'pointer',
                  }}
                >
                  <div style={{
                    width: '100%',
                    height: (wk.hours / 42) * 100 + '%',
                    background: under ? 'var(--warn)' : 'var(--accent)',
                    opacity: isSelected ? 1 : (wk.isCurrent ? 1 : 0.7),
                    borderRadius: '2px 2px 0 0',
                    outline: isSelected ? '2px solid var(--ink)' : 'none',
                    outlineOffset: 1,
                  }} />
                </button>
              );
            })}
            <div style={{ position: 'absolute', left: 0, right: 0, bottom: (person.target / 42) * 100 + '%', borderTop: '1px dashed var(--bad)', pointerEvents: 'none' }} />
          </div>
          <div className="mono" style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11, color: 'var(--ink-muted)', marginTop: 4 }}>
            <span>KW 1</span><span>KW 13</span><span>KW 26</span><span>KW 39</span><span>KW 52</span>
          </div>

          {weekDetail && (
            <div style={{ marginTop: 12, padding: 12, background: 'var(--surface-alt)', border: '1px solid var(--border)', borderRadius: 'var(--r-md)' }}>
              <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 8 }}>
                <div>
                  <span style={{ fontSize: 14, fontWeight: 700 }}>KW {weekDetail.kw}</span>
                  <span className="mono" style={{ fontSize: 12, color: 'var(--ink-muted)', marginLeft: 8 }}>
                    {weekDetail.hours.toFixed(1)} / {weekDetail.target.toFixed(1)}h · {weekDetail.days} Tage
                  </span>
                </div>
                <button
                  onClick={() => setSelectedWeek(null)}
                  aria-label="Schließen"
                  style={{ background: 'transparent', border: 'none', cursor: 'pointer', color: 'var(--ink-muted)', fontSize: 14, padding: 2 }}
                >×</button>
              </div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                {weekDetail.shifts.map((s, si) => (
                  <div key={si} style={{ display: 'grid', gridTemplateColumns: '40px 1fr', gap: 10, fontSize: 12, padding: '4px 0', borderTop: si === 0 ? 'none' : '1px solid var(--border)' }}>
                    <span style={{ fontWeight: 600 }}>{s.day}</span>
                    <span className="mono" style={{ color: 'var(--ink-soft)' }}>{s.from}–{s.to}</span>
                  </div>
                ))}
              </div>
              <div style={{ marginTop: 8, paddingTop: 8, borderTop: '1px solid var(--border)', fontSize: 12, color: 'var(--ink-muted)' }}>
                {weekDetail.hours < weekDetail.target
                  ? <span><span style={{ color: 'var(--warn)', fontWeight: 600 }}>−{(weekDetail.target - weekDetail.hours).toFixed(1)}h unter Soll</span></span>
                  : weekDetail.hours > weekDetail.target
                  ? <span><span style={{ color: 'var(--good)', fontWeight: 600 }}>+{(weekDetail.hours - weekDetail.target).toFixed(1)}h über Soll</span></span>
                  : <span><span style={{ color: 'var(--good)', fontWeight: 600 }}>Soll erreicht</span></span>}
              </div>
            </div>
          )}

          {expandWeeks && (
            <div style={{ marginTop: 10, fontSize: 12 }}>
              {weeks.filter((wk) => wk.hasData).slice(-5).reverse().map((wk) => {
                const under = wk.hours < wk.target;
                return (
                  <button
                    key={wk.kw}
                    onClick={() => setSelectedWeek(wk.kw - 1)}
                    style={{
                      width: '100%', textAlign: 'left',
                      display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                      padding: '6px 8px',
                      background: selectedWeek === wk.kw - 1 ? 'var(--accent-soft)' : 'transparent',
                      border: 'none', borderBottom: '1px solid var(--border)',
                      cursor: 'pointer', fontSize: 12,
                    }}
                  >
                    <span>KW {wk.kw}</span>
                    <span className="mono" style={{ color: under ? 'var(--warn)' : 'var(--ink-soft)' }}>
                      {wk.hours.toFixed(2)} / {wk.target.toFixed(2)} Std.
                    </span>
                  </button>
                );
              })}
            </div>
          )}
        </section>

        {/* Zusatzstunden */}
        <section className="employee-detail-col-3">
          <h2 style={{ fontSize: 15, fontWeight: 700, margin: '0 0 8px' }}>Zusatzstunden</h2>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
            {[
              { date: '17.04.2026', cat: 'Urlaub', catColor: 'var(--good)', hours: 8.0, note: 'Karfreitag' },
              { date: '11.04.2026', cat: 'Krank', catColor: 'var(--bad)', hours: 8.0, note: '' },
              { date: '03.04.2026', cat: 'Zusatzarbeit', catColor: 'var(--accent)', hours: 2.5, note: 'Inventur' },
              { date: '28.03.2026', cat: 'Feiertage', catColor: 'var(--warn)', hours: 8.0, note: 'Karfreitag' },
              { date: '15.03.2026', cat: 'Urlaub', catColor: 'var(--good)', hours: 16.0, note: '' },
            ].map((r, i) => (
              <div key={i} style={{ display: 'grid', gridTemplateColumns: '90px 1fr auto', gap: 8, padding: '6px 0', borderBottom: '1px solid var(--border)', alignItems: 'center' }}>
                <span className="mono" style={{ fontSize: 12, color: 'var(--ink-muted)' }}>{r.date}</span>
                <div>
                  <div style={{ fontSize: 14 }}>{r.cat}</div>
                  {r.note && <div style={{ fontSize: 12, color: 'var(--ink-muted)' }}>{r.note}</div>}
                </div>
                <span className="mono" style={{ fontSize: 14, fontWeight: 600 }}>{r.hours.toFixed(2)}h</span>
              </div>
            ))}
          </div>
        </section>
      </div>

      <ContractModal
        open={contractOpen}
        onClose={() => setContractOpen(false)}
        variant={modalVariant}
        initial={contractInitial}
      />
      <ExtraHoursModal
        open={extraOpen}
        onClose={() => setExtraOpen(false)}
        variant={modalVariant}
      />
    </div>
  );
}

              {['Zeitraum', 'Erstellt', 'SalesPersons', 'Status', ''].map((h) => (
                <th key={h} style={{ padding: '10px 14px', fontSize: 12, fontWeight: 600, color: 'var(--ink-muted)', textTransform: 'uppercase', letterSpacing: '0.04em' }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {visible.map((p) => (
              <tr key={p.id} style={{ borderTop: '1px solid var(--border)', opacity: p.deleted ? 0.55 : 1 }}>
                <td style={{ padding: '10px 14px' }}>
                  <div className="mono" style={{ fontWeight: 600 }}>{p.from} – {p.to}</div>
                </td>
                <td style={{ padding: '10px 14px', color: 'var(--ink-muted)' }}>
                  <div className="mono" style={{ fontSize: 12 }}>{p.createdAt}</div>
                  <div style={{ fontSize: 12 }}>von {p.createdBy}</div>
                </td>
                <td className="mono" style={{ padding: '10px 14px' }}>{p.salesCount}</td>
                <td style={{ padding: '10px 14px' }}>
                  {p.deleted ? (
                    <span title={`${p.deletedAt} · ${p.deletedBy}`} style={{ fontSize: 12, padding: '2px 8px', borderRadius: 999, background: 'var(--bad-soft)', color: 'var(--bad)', fontWeight: 600 }}>Gelöscht</span>
                  ) : (
                    <span style={{ fontSize: 12, padding: '2px 8px', borderRadius: 999, background: 'var(--good-soft)', color: 'var(--good)', fontWeight: 600 }}>Aktiv</span>
                  )}
                </td>
                <td style={{ padding: '10px 14px', textAlign: 'right', whiteSpace: 'nowrap' }}>
                  <Btn kind="ghost" onClick={() => setSelectedPeriod(p)}>Details</Btn>
                  {!p.deleted && <Btn kind="ghost">Löschen</Btn>}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ─── Abrechnungszeitraum-Detail ─────────────────────────────
// Read-only Snapshot: zeigt pro SalesPerson die eingefrorenen Stunden-Werte.
// Layout via Tweak: 'table' (kompakt) | 'cards' (per Person) | 'split' (Master/Detail).
function BillingDetailPage({ period, onBack, layout }) {
  // Synthetic data mirroring the Dioxus BillingPeriod.sales_persons shape:
  // each entry has values keyed by metric, with delta/ytd_from/ytd_to/full_year.
  // Custom extra-hour categories are merged in alongside the four core metrics.
  const rows = useMemo(() => PEOPLE.slice(0, 12).map((p, idx) => {
    const expected = [80, 80, 60, 80, 40, 80, 60, 80, 40, 80, 80, 60][idx] || 80;
    const overall = expected + [-2.5, 4, 0, -8, 1.5, 0, -3, 6, 2, -1, 0, -4][idx];
    const sick = [0, 0, 8, 0, 0, 0, 16, 0, 0, 0, 0, 8][idx] || 0;
    const vacation = [0, 16, 0, 0, 0, 0, 0, 0, 0, 24, 0, 0][idx] || 0;
    const volunteer = [4, 0, 2, 6, 0, 1, 0, 3, 0, 0, 2, 0][idx] || 0;
    const balance = overall - expected;
    const ytdFrom = [12, -4, 8, -2, 0, 6, -10, 4, 0, 18, 2, -6][idx];
    const ytdTo = ytdFrom + balance;
    const shifts = Math.round(overall / 6);
    return {
      id: p.id,
      name: p.name,
      color: p.color,
      paid: p.paid !== false,
      active: idx !== 9, // Lena (idx 9) ist als inaktiv markiert für Demo
      shifts,
      values: {
        EXPECTED_HOURS: { delta: expected, ytdFrom: 0, ytdTo: expected * 4, fullYear: expected * 12 },
        OVERALL:        { delta: overall, ytdFrom: 0, ytdTo: overall * 4, fullYear: overall * 12 },
        BALANCE:        { delta: balance, ytdFrom, ytdTo, fullYear: ytdTo },
        VOLUNTEER:      { delta: volunteer, ytdFrom: 0, ytdTo: volunteer * 4, fullYear: volunteer * 12 },
        SICK:           { delta: sick, ytdFrom: 0, ytdTo: sick * 4, fullYear: sick * 12 },
        VACATION:       { delta: vacation, ytdFrom: 0, ytdTo: vacation * 4, fullYear: vacation * 12 },
      },
    };
  }), []);

  const [showPaidOnly, setShowPaidOnly] = useState(false);
  const [showActiveOnly, setShowActiveOnly] = useState(false);
  const [filter, setFilter] = useState('');
  const [selectedId, setSelectedId] = useState(rows[0]?.id);

  const filtered = rows.filter((r) => {
    if (showPaidOnly && !r.paid) return false;
    if (showActiveOnly && !r.active) return false;
    if (filter && !r.name.toLowerCase().includes(filter.toLowerCase())) return false;
    return true;
  });

  // Aggregate totals — useful at a glance, even though the period itself is frozen
  const totals = filtered.reduce((acc, r) => ({
    expected: acc.expected + r.values.EXPECTED_HOURS.delta,
    overall:  acc.overall  + r.values.OVERALL.delta,
    balance:  acc.balance  + r.values.BALANCE.delta,
    volunteer: acc.volunteer + r.values.VOLUNTEER.delta,
    sick:     acc.sick + r.values.SICK.delta,
    vacation: acc.vacation + r.values.VACATION.delta,
    shifts:   acc.shifts + r.shifts,
  }), { expected: 0, overall: 0, balance: 0, volunteer: 0, sick: 0, vacation: 0, shifts: 0 });

  return (
    <div style={{ padding: 18, display: 'flex', flexDirection: 'column', gap: 16 }}>
      {/* Breadcrumb + back */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 13, color: 'var(--ink-muted)' }}>
        <button onClick={onBack} style={{
          border: 'none', background: 'transparent', cursor: 'pointer',
          color: 'var(--accent)', fontWeight: 500, padding: 0, fontSize: 13,
        }}>← Abrechnungszeiträume</button>
      </div>

      {/* Header card — period meta */}
      <div style={{
        background: 'var(--surface)', border: '1px solid var(--border)',
        borderRadius: 'var(--r-lg)', padding: '18px 20px',
        display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 20, flexWrap: 'wrap',
      }}>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8, minWidth: 0 }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--ink-muted)', textTransform: 'uppercase', letterSpacing: '0.06em' }}>
            Abrechnungszeitraum
          </div>
          <h1 className="mono" style={{ fontSize: 28, fontWeight: 600, margin: 0, letterSpacing: '-0.02em' }}>
            {period.from} – {period.to}
          </h1>
          <div style={{ display: 'flex', alignItems: 'center', gap: 14, flexWrap: 'wrap', fontSize: 13, color: 'var(--ink-muted)' }}>
            <span>Erstellt am <span className="mono" style={{ color: 'var(--ink-soft)' }}>{period.createdAt}</span> von <strong style={{ color: 'var(--ink-soft)' }}>{period.createdBy}</strong></span>
            {period.deleted ? (
              <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4, fontSize: 12, padding: '2px 10px', borderRadius: 999, background: 'var(--bad-soft)', color: 'var(--bad)', fontWeight: 600 }}>
                Gelöscht am {period.deletedAt} von {period.deletedBy}
              </span>
            ) : (
              <span style={{ fontSize: 12, padding: '2px 10px', borderRadius: 999, background: 'var(--good-soft)', color: 'var(--good)', fontWeight: 600 }}>Aktiv</span>
            )}
          </div>
        </div>
        <div style={{
          display: 'inline-flex', alignItems: 'center', gap: 6,
          fontSize: 11, padding: '4px 10px', borderRadius: 999,
          background: 'var(--surface-2)', color: 'var(--ink-muted)',
          fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.06em',
          alignSelf: 'flex-start',
        }}>
          <span aria-hidden="true">🔒</span> Eingefroren · Read-only
        </div>
      </div>

      {/* Summary tiles */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(150px, 1fr))', gap: 10 }}>
        {[
          { label: 'SalesPersons',  val: filtered.length + (filter || showPaidOnly || showActiveOnly ? ` / ${rows.length}` : ''), tone: 'neutral' },
          { label: 'Schichten',     val: totals.shifts, tone: 'neutral' },
          { label: 'Ist-Stunden',   val: totals.overall.toFixed(1) + 'h', tone: 'neutral' },
          { label: 'Soll-Stunden',  val: totals.expected.toFixed(1) + 'h', tone: 'neutral' },
          { label: 'Saldo',         val: (totals.balance > 0 ? '+' : '') + totals.balance.toFixed(1) + 'h', tone: totals.balance < 0 ? 'warn' : 'good' },
          { label: 'Ehrenamt',      val: totals.volunteer.toFixed(1) + 'h', tone: 'neutral' },
        ].map((t) => (
          <div key={t.label} style={{
            background: 'var(--surface)', border: '1px solid var(--border)',
            borderRadius: 'var(--r-md)', padding: '10px 14px',
          }}>
            <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--ink-muted)', textTransform: 'uppercase', letterSpacing: '0.04em' }}>
              {t.label}
            </div>
            <div className="mono" style={{
              fontSize: 20, fontWeight: 600, marginTop: 2,
              color: t.tone === 'warn' ? 'var(--warn)' : t.tone === 'good' ? 'var(--good)' : 'var(--ink)',
            }}>
              {t.val}
            </div>
          </div>
        ))}
      </div>

      {/* Filter row */}
      <div style={{ display: 'flex', gap: 12, alignItems: 'center', flexWrap: 'wrap' }}>
        <input
          type="text"
          value={filter}
          onChange={(e) => setFilter(e.target.value)}
          placeholder="Person filtern…"
          style={{
            flex: '1 1 220px', maxWidth: 320,
            padding: '7px 12px', fontSize: 13,
            border: '1px solid var(--border)', borderRadius: 'var(--r-md)',
            background: 'var(--surface)', color: 'var(--ink)',
            outline: 'none',
          }}
        />
        <label style={{ display: 'inline-flex', alignItems: 'center', gap: 6, fontSize: 13, color: 'var(--ink-muted)', cursor: 'pointer' }}>
          <input type="checkbox" checked={showPaidOnly} onChange={(e) => setShowPaidOnly(e.target.checked)} />
          Nur bezahlte
        </label>
        <label style={{ display: 'inline-flex', alignItems: 'center', gap: 6, fontSize: 13, color: 'var(--ink-muted)', cursor: 'pointer' }}>
          <input type="checkbox" checked={showActiveOnly} onChange={(e) => setShowActiveOnly(e.target.checked)} />
          Nur aktive
        </label>
        <span style={{ fontSize: 12, color: 'var(--ink-muted)', marginLeft: 'auto' }}>
          {filtered.length} von {rows.length}
        </span>
      </div>

      {/* Layout-specific body */}
      {layout === 'table' && <BillingDetailTable rows={filtered} />}
      {layout === 'cards' && <BillingDetailCards rows={filtered} />}
      {layout === 'split' && (
        <BillingDetailSplit
          rows={filtered}
          selectedId={selectedId}
          onSelect={setSelectedId}
          period={period}
        />
      )}
    </div>
  );
}

function fmt(h, signed) {
  const v = h.toFixed(1);
  if (signed && h > 0) return '+' + v + 'h';
  return v + 'h';
}

function PersonAvatar({ row, size = 28 }) {
  return (
    <span style={{
      width: size, height: size, borderRadius: '50%',
      background: row.color || 'transparent',
      border: row.color ? 'none' : '1px dashed var(--border-strong)',
      flexShrink: 0,
      display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
      fontSize: size * 0.4, fontWeight: 700,
      color: 'var(--ink)',
    }} aria-hidden="true" />
  );
}

// ─── Variant 1: dense table — best for scanning all people at once ──
function BillingDetailTable({ rows }) {
  return (
    <div style={{
      background: 'var(--surface)', border: '1px solid var(--border)',
      borderRadius: 'var(--r-lg)', overflow: 'hidden',
    }}>
      <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
        <thead>
          <tr style={{ background: 'var(--surface-alt)', textAlign: 'left' }}>
            {[
              ['SalesPerson', 'left'], ['Schichten', 'right'],
              ['Soll', 'right'], ['Ist', 'right'], ['Saldo', 'right'],
              ['Ehrenamt', 'right'], ['Krank', 'right'], ['Urlaub', 'right'],
            ].map(([h, a]) => (
              <th key={h} style={{
                padding: '10px 14px', fontSize: 11, fontWeight: 600,
                color: 'var(--ink-muted)', textTransform: 'uppercase',
                letterSpacing: '0.04em', textAlign: a, whiteSpace: 'nowrap',
              }}>{h}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {rows.map((r) => {
            const bal = r.values.BALANCE.delta;
            return (
              <tr key={r.id} style={{ borderTop: '1px solid var(--border)' }}>
                <td style={{ padding: '8px 14px' }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                    <PersonAvatar row={r} size={24} />
                    <span style={{ fontWeight: 500 }}>{r.name}</span>
                    {!r.paid && <span style={{ fontSize: 10, padding: '1px 6px', borderRadius: 999, background: 'var(--surface-2)', color: 'var(--ink-muted)' }}>frw.</span>}
                    {!r.active && <span style={{ fontSize: 10, padding: '1px 6px', borderRadius: 999, background: 'var(--bad-soft)', color: 'var(--bad)' }}>inaktiv</span>}
                  </div>
                </td>
                <td className="mono" style={{ padding: '8px 14px', textAlign: 'right' }}>{r.shifts}</td>
                <td className="mono" style={{ padding: '8px 14px', textAlign: 'right', color: 'var(--ink-muted)' }}>{fmt(r.values.EXPECTED_HOURS.delta)}</td>
                <td className="mono" style={{ padding: '8px 14px', textAlign: 'right' }}>{fmt(r.values.OVERALL.delta)}</td>
                <td className="mono" style={{
                  padding: '8px 14px', textAlign: 'right', fontWeight: 600,
                  color: bal < 0 ? 'var(--warn)' : bal > 0 ? 'var(--good)' : 'var(--ink-muted)',
                }}>{fmt(bal, true)}</td>
                <td className="mono" style={{ padding: '8px 14px', textAlign: 'right', color: r.values.VOLUNTEER.delta > 0 ? 'var(--ink)' : 'var(--ink-muted)' }}>{fmt(r.values.VOLUNTEER.delta)}</td>
                <td className="mono" style={{ padding: '8px 14px', textAlign: 'right', color: r.values.SICK.delta > 0 ? 'var(--ink)' : 'var(--ink-muted)' }}>{fmt(r.values.SICK.delta)}</td>
                <td className="mono" style={{ padding: '8px 14px', textAlign: 'right', color: r.values.VACATION.delta > 0 ? 'var(--ink)' : 'var(--ink-muted)' }}>{fmt(r.values.VACATION.delta)}</td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

// ─── Variant 2: card per person — closer to the Dioxus original ──
function BillingDetailCards({ rows }) {
  return (
    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(360px, 1fr))', gap: 12 }}>
      {rows.map((r) => {
        const bal = r.values.BALANCE.delta;
        const balTone = bal < 0 ? 'var(--warn)' : bal > 0 ? 'var(--good)' : 'var(--ink-muted)';
        return (
          <div key={r.id} style={{
            background: 'var(--surface)', border: '1px solid var(--border)',
            borderRadius: 'var(--r-lg)', padding: 16,
            display: 'flex', flexDirection: 'column', gap: 12,
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <PersonAvatar row={r} size={32} />
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontWeight: 600, fontSize: 15 }}>{r.name}</div>
                <div style={{ fontSize: 12, color: 'var(--ink-muted)' }}>
                  {r.shifts} Schichten
                </div>
              </div>
              {!r.paid && <span style={{ fontSize: 11, padding: '2px 8px', borderRadius: 999, background: 'var(--surface-2)', color: 'var(--ink-muted)' }}>freiwillig</span>}
              {!r.active && <span style={{ fontSize: 11, padding: '2px 8px', borderRadius: 999, background: 'var(--bad-soft)', color: 'var(--bad)' }}>inaktiv</span>}
            </div>

            {/* Saldo big number */}
            <div style={{
              padding: '10px 12px', borderRadius: 'var(--r-md)',
              background: bal < 0 ? 'var(--warn-soft)' : bal > 0 ? 'var(--good-soft)' : 'var(--surface-alt)',
              display: 'flex', alignItems: 'baseline', gap: 8,
            }}>
              <span className="mono" style={{ fontSize: 22, fontWeight: 700, color: balTone }}>
                {fmt(bal, true)}
              </span>
              <span style={{ fontSize: 12, color: balTone, fontWeight: 500 }}>Saldo</span>
              <span className="mono" style={{ marginLeft: 'auto', fontSize: 11, color: 'var(--ink-muted)' }}>
                YTD {fmt(r.values.BALANCE.ytdTo, true)}
              </span>
            </div>

            {/* Metric grid */}
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
              {[
                ['Soll',     fmt(r.values.EXPECTED_HOURS.delta), 'var(--ink-muted)'],
                ['Ist',      fmt(r.values.OVERALL.delta),        'var(--ink)'],
                ['Ehrenamt', fmt(r.values.VOLUNTEER.delta),      r.values.VOLUNTEER.delta > 0 ? 'var(--ink)' : 'var(--ink-muted)'],
                ['Krank',    fmt(r.values.SICK.delta),           r.values.SICK.delta > 0 ? 'var(--ink)' : 'var(--ink-muted)'],
                ['Urlaub',   fmt(r.values.VACATION.delta),       r.values.VACATION.delta > 0 ? 'var(--ink)' : 'var(--ink-muted)'],
              ].map(([lbl, val, color]) => (
                <div key={lbl} style={{
                  display: 'flex', justifyContent: 'space-between', alignItems: 'baseline',
                  padding: '4px 0',
                  borderBottom: '1px dashed var(--border)',
                }}>
                  <span style={{ fontSize: 12, color: 'var(--ink-muted)' }}>{lbl}</span>
                  <span className="mono" style={{ fontSize: 13, fontWeight: 500, color }}>{val}</span>
                </div>
              ))}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ─── Variant 3: master/detail — overview list + deep-dive panel ──
function BillingDetailSplit({ rows, selectedId, onSelect, period }) {
  const sel = rows.find((r) => r.id === selectedId) || rows[0];
  if (!sel) return <div style={{ color: 'var(--ink-muted)', fontStyle: 'italic' }}>Keine Personen im Filter.</div>;

  return (
    <div style={{ display: 'grid', gridTemplateColumns: 'minmax(240px, 320px) 1fr', gap: 16, alignItems: 'start' }}>
      {/* Master list */}
      <div style={{
        background: 'var(--surface)', border: '1px solid var(--border)',
        borderRadius: 'var(--r-lg)', overflow: 'hidden',
        position: 'sticky', top: 12,
        maxHeight: 'calc(100vh - 24px)', overflowY: 'auto',
      }}>
        {rows.map((r) => {
          const bal = r.values.BALANCE.delta;
          const active = r.id === sel.id;
          return (
            <button
              key={r.id}
              onClick={() => onSelect(r.id)}
              style={{
                width: '100%', textAlign: 'left',
                padding: '10px 14px',
                background: active ? 'var(--accent-soft)' : 'transparent',
                border: 'none', borderBottom: '1px solid var(--border)',
                cursor: 'pointer',
                display: 'flex', alignItems: 'center', gap: 10,
                color: 'var(--ink)',
              }}
              onMouseEnter={(e) => { if (!active) e.currentTarget.style.background = 'var(--surface-alt)'; }}
              onMouseLeave={(e) => { if (!active) e.currentTarget.style.background = 'transparent'; }}
            >
              <PersonAvatar row={r} size={28} />
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 13, fontWeight: active ? 600 : 500, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{r.name}</div>
                <div style={{ fontSize: 11, color: 'var(--ink-muted)' }}>{r.shifts} Schichten</div>
              </div>
              <span className="mono" style={{
                fontSize: 12, fontWeight: 600,
                color: bal < 0 ? 'var(--warn)' : bal > 0 ? 'var(--good)' : 'var(--ink-muted)',
              }}>{fmt(bal, true)}</span>
            </button>
          );
        })}
      </div>

      {/* Detail panel */}
      <div style={{
        background: 'var(--surface)', border: '1px solid var(--border)',
        borderRadius: 'var(--r-lg)', padding: 20,
        display: 'flex', flexDirection: 'column', gap: 18,
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
          <PersonAvatar row={sel} size={48} />
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 22, fontWeight: 600, letterSpacing: '-0.01em' }}>{sel.name}</div>
            <div style={{ fontSize: 13, color: 'var(--ink-muted)' }}>
              {sel.shifts} Schichten · {sel.paid ? 'bezahlt' : 'freiwillig'} · {sel.active ? 'aktiv' : 'inaktiv'}
            </div>
          </div>
        </div>

        {/* Werte-Tabelle: pro Metric die delta + YTD-Reihe (wie im Dioxus-Original) */}
        <div>
          <div style={{ fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--ink-muted)', marginBottom: 8 }}>
            Werte
          </div>
          <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
            <thead>
              <tr style={{ background: 'var(--surface-alt)' }}>
                {['Kategorie', 'Δ Zeitraum', 'YTD vorher', 'YTD danach', 'Volljahr'].map((h, i) => (
                  <th key={h} style={{
                    padding: '8px 12px', fontSize: 11, fontWeight: 600,
                    color: 'var(--ink-muted)', textTransform: 'uppercase',
                    letterSpacing: '0.04em', textAlign: i === 0 ? 'left' : 'right',
                  }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {[
                ['Soll-Stunden',  'EXPECTED_HOURS', 'var(--ink-muted)'],
                ['Ist-Stunden',   'OVERALL',         'var(--ink)'],
                ['Saldo',         'BALANCE',         null],
                ['Ehrenamt',      'VOLUNTEER',       'var(--ink)'],
                ['Krank',         'SICK',            'var(--ink)'],
                ['Urlaub',        'VACATION',        'var(--ink)'],
              ].map(([label, key, defaultColor]) => {
                const v = sel.values[key];
                const isBalance = key === 'BALANCE';
                const tone = isBalance ? (v.delta < 0 ? 'var(--warn)' : v.delta > 0 ? 'var(--good)' : 'var(--ink-muted)') : defaultColor;
                return (
                  <tr key={key} style={{ borderTop: '1px solid var(--border)' }}>
                    <td style={{ padding: '10px 12px', fontWeight: 500 }}>{label}</td>
                    <td className="mono" style={{ padding: '10px 12px', textAlign: 'right', fontWeight: isBalance ? 600 : 500, color: tone }}>
                      {fmt(v.delta, isBalance)}
                    </td>
                    <td className="mono" style={{ padding: '10px 12px', textAlign: 'right', color: 'var(--ink-muted)' }}>{fmt(v.ytdFrom, isBalance)}</td>
                    <td className="mono" style={{ padding: '10px 12px', textAlign: 'right', color: 'var(--ink-muted)' }}>{fmt(v.ytdTo, isBalance)}</td>
                    <td className="mono" style={{ padding: '10px 12px', textAlign: 'right', color: 'var(--ink-muted)' }}>{fmt(v.fullYear, isBalance)}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>

        <div style={{ fontSize: 12, color: 'var(--ink-muted)', borderTop: '1px solid var(--border)', paddingTop: 12 }}>
          <span aria-hidden="true">🔒</span> Werte sind beim Anlegen am {period.createdAt} eingefroren. Spätere Änderungen an Schichten oder Stunden wirken sich nicht mehr aus.
        </div>
      </div>
    </div>
  );
}

// ─── Benutzerverwaltung ──────────────────────────────────────

      <div style={{ display: 'flex', gap: 0, borderBottom: '1px solid var(--border)', marginBottom: 14 }}>

            color: tab === k ? 'var(--accent)' : 'var(--ink-muted)',

        <div className="users-table-wrap" style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 'var(--r-lg)', overflow: 'hidden' }}>
          <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 14 }}>
            <thead>
              <tr style={{ background: 'var(--surface-alt)', textAlign: 'left' }}>
                {['Benutzer', 'Verknüpfter SalesPerson', 'Rollen', 'Status', ''].map((h) => (
                  <th key={h} style={{ padding: '10px 14px', fontSize: 12, fontWeight: 600, color: 'var(--ink-muted)', textTransform: 'uppercase', letterSpacing: '0.04em' }}>{h}</th>
                ))}

            </thead>
            <tbody>
              {users.map((u) => (
                <tr key={u.name} style={{ borderTop: '1px solid var(--border)' }}>
                  <td className="mono" style={{ padding: '10px 14px', fontWeight: 600 }}>{u.name}</td>
                  <td style={{ padding: '10px 14px' }}>{u.sales}</td>
                  <td style={{ padding: '10px 14px' }}>
                    <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap' }}>
                      {u.roles.length === 0 ? <span style={{ color: 'var(--ink-muted)' }}>—</span> : u.roles.map((r) => (
                        <span key={r} style={{ fontSize: 12, padding: '1px 7px', borderRadius: 999, background: 'var(--accent-soft)', color: 'var(--accent)', fontWeight: 600 }}>{r}</span>
                      ))}

                      <span style={{ display: 'inline-flex', alignItems: 'center', gap: 5, fontSize: 12, color: 'var(--good)' }}>

          <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 14 }}>

              <tr style={{ background: 'var(--surface-alt)', textAlign: 'left' }}>

                <tr key={s.id} style={{ borderTop: '1px solid var(--border)' }}>
                  <td style={{ padding: '10px 14px' }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                      <span aria-hidden="true" style={{
                        width: 18, height: 18, borderRadius: '50%',
                        background: s.color || 'transparent',
                        border: s.color ? 'none' : '1px dashed var(--border-strong)',
                        flexShrink: 0,
                      }} />
                      <span style={{ fontWeight: 500 }}>{s.name}</span>
                    </div>
                  </td>
                  <td style={{ padding: '10px 14px' }}>
                    <span style={{
                      fontSize: 12, padding: '1px 7px', borderRadius: 999,
                      background: s.paid ? 'var(--accent-soft)' : 'var(--surface-2)',
                      color: s.paid ? 'var(--accent)' : 'var(--ink-muted)',
                      fontWeight: 600,
                    }}>{s.paid ? 'Bezahlt' : 'Freiwillig'}</span>
